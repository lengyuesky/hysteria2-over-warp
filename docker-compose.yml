services:
  warp:
    image: ghcr.io/lengyuesky/hysteria2-over-warp:latest
    container_name: warp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    stdin_open: true
    tty: true
    networks:
      - warp_macvlan

networks:
  warp_macvlan:
    driver: macvlan
    driver_opts:
      parent: eth0
    enable_ipv6: true
    ipam:
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.1
        - subnet: 2001:db8:10::/64
          gateway: 2001:db8:10::1
